<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ФУТБОЛЬНАЯ ИМПЕРИЯ PRO</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --accent-gold: #ffcc00;
            --accent-red: #ff3366;
            --accent-blue: #00ccff;
            --neon-green: #33ff99;
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1e2f 0%, var(--bg-dark) 100%);
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ШАПКА */
        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 25px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--accent-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* НАВИГАЦИЯ */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 40px 0;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 15px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tab-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }

        .tab-btn.active {
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
            border-color: #fff;
            box-shadow: 0 0 25px rgba(0, 204, 255, 0.5);
        }

        .container { padding: 0 60px 60px 60px; max-width: 1600px; margin: auto; }
        .tab-content { display: none; animation: slideUp 0.6s ease-out; }
        .tab-content.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* КАРТОЧКИ КЛУБОВ */
        .grid-clubs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 35px;
        }

        .club-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            position: relative;
            transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .club-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 50px rgba(237, 187, 0, 0.2);
        }

        .club-info { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }

        .club-name { font-size: 24px; font-weight: 900; color: #fff; text-transform: uppercase; }

        .badge-money {
            background: linear-gradient(90deg, #11998e, #38ef7d);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            color: #000;
        }

        .coach-section {
            background: rgba(0, 204, 255, 0.1);
            border: 1px dashed var(--accent-blue);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        /* ТАБЛИЦА ИГРОКОВ ВНУТРИ КАРТОЧКИ */
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* ФОРМЫ (АДМИНКА) */
        .glass-form {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 35px;
        }

        input, select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            width: 100%;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-action { background: var(--accent-gold); color: #000; width: 100%; }
        .btn-sell { background: rgba(255, 51, 102, 0.2); color: #ff3366; border: 1px solid #ff3366; }
        .btn-buy { background: var(--neon-green); color: #000; }

    </style>
</head>
<body>

<header>
    <div class="logo">FOOTBALL EMPIRE <span style="font-weight: 400; color: #fff">| Менеджер</span></div>
    <div style="font-weight: bold; color: var(--accent-gold)">СЕЗОН 2026</div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="openTab('overview')">🏟️ Мои Клубы</button>
    <button class="tab-btn" onclick="openTab('transfers')">⚽ Трансферный Рынок</button>
    <button class="tab-btn" onclick="openTab('admin')">🛠️ Управление БАЗОЙ</button>
</div>

<div class="container">

    <div id="overview" class="tab-content active">
        <div class="grid-clubs">
            <div th:each="club : ${clubs}" class="club-card">
                <button class="btn btn-sell" style="position: absolute; right: 20px; top: 20px; padding: 5px 10px;" th:onclick="'deleteClub(' + ${club.id} + ')'">×</button>

                <div class="club-info">
                    <img th:src="'https://api.dicebear.com/7.x/identicon/svg?seed=' + ${club.name}" style="width: 60px; height: 60px; border-radius: 15px;">
                    <div>
                        <div class="club-name" th:text="${club.name}">ФК СПАРТАК</div>
                        <div class="badge-money" th:text="${club.balance + ' €'}">50 000 €</div>
                    </div>
                </div>

                <div class="coach-section">
                    <span style="font-size: 10px; color: var(--accent-blue); font-weight: 900; text-transform: uppercase;">Главный Тренер:</span>
                    <div style="font-size: 18px; font-weight: 700;" th:text="${club.coach != null ? club.coach.name : 'ВАКАНСИЯ ОТКРЫТА'}"></div>
                </div>

                <div style="font-weight: bold; margin-bottom: 10px; font-size: 12px; color: #777;">СОСТАВ КОМАНДЫ:</div>
                <div th:each="p : ${club.players}" class="player-row">
                    <div>
                        <span style="color: var(--accent-gold); font-weight: bold;" th:text="'#' + ${p.number != null ? p.number : '?' }"></span>
                        <span th:text="${p.name}" style="margin-left: 10px;"></span>
                    </div>
                    <button class="btn btn-sell" style="font-size: 10px; padding: 5px 12px" th:onclick="'sellPlayer(' + ${club.id} + ',' + ${p.id} + ')'">ПРОДАТЬ</button>
                </div>
                <div th:if="${#lists.isEmpty(club.players)}" style="text-align: center; padding: 20px; color: #555;">Игроков пока нет...</div>
            </div>
        </div>
    </div>

    <div id="transfers" class="tab-content">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px">
            <div class="glass-form">
                <h2 style="color: var(--neon-green); text-transform: uppercase;">Рынок Игроков</h2>
                <div th:each="fp : ${freePlayers}" style="display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px">
                    <div style="flex-grow: 1">
                        <div th:text="${fp.name}" style="font-weight: bold;"></div>
                        <div style="color: var(--neon-green); font-size: 12px;" th:text="${fp.price + ' €'}"></div>
                    </div>
                    <select th:id="'selectClubP' + ${fp.id}" style="width: 150px; margin: 0">
                        <option th:each="c : ${clubs}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                    <button class="btn btn-buy" th:onclick="'buyPlayer(' + ${fp.id} + ')'">КУПИТЬ</button>
                </div>
            </div>

            <div class="glass-form">
                <h2 style="color: var(--accent-blue); text-transform: uppercase;">Биржа Тренеров</h2>
                <div th:each="fc : ${freeCoaches}" style="display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px">
                    <div style="flex-grow: 1">
                        <div th:text="${fc.name}" style="font-weight: bold;"></div>
                        <div style="color: var(--accent-blue); font-size: 12px;" th:text="${fc.price + ' €'}"></div>
                    </div>
                    <select th:id="'selectClubC' + ${fc.id}" style="width: 150px; margin: 0">
                        <option th:each="c : ${clubs}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                    <button class="btn btn-buy" style="background: var(--accent-blue)" th:onclick="'hireCoach(' + ${fc.id} + ')'">НАНЯТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin" class="tab-content">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px">
            <div class="glass-form">
                <h3 style="color: var(--accent-gold)">ЗАРЕГИСТРИРОВАТЬ КЛУБ</h3>
                <input id="in_cn" placeholder="Название команды">
                <input id="in_cb" type="number" placeholder="Бюджет (€)" value="100000">
                <button class="btn btn-action" onclick="apiAddClub()">СОЗДАТЬ</button>
            </div>
            <div class="glass-form">
                <h3 style="color: var(--neon-green)">СОЗДАТЬ ИГРОКА</h3>
                <input id="in_pn" placeholder="Имя игрока">
                <input id="in_pp" type="number" placeholder="Стоимость (€)" value="5000">
                <button class="btn btn-action" style="background: var(--neon-green)" onclick="apiAddPlayer()">В БАЗУ</button>
            </div>
            <div class="glass-form">
                <h3 style="color: var(--accent-blue)">НАЙТИ ТРЕНЕРА</h3>
                <input id="in_con" placeholder="Имя специалиста">
                <input id="in_cop" type="number" placeholder="Контракт (€)" value="15000">
                <button class="btn btn-action" style="background: var(--accent-blue)" onclick="apiAddCoach()">В РЕЗЕРВ</button>
            </div>
        </div>
    </div>

</div>

<script>
    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // API Вызовы
    async function apiAddClub() {
        await fetch('/api/clubs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:document.getElementById('in_cn').value, balance:document.getElementById('in_cb').value}) });
        location.reload();
    }
    async function apiAddPlayer() {
        await fetch('/api/players', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:document.getElementById('in_pn').value, price:document.getElementById('in_pp').value}) });
        location.reload();
    }
    async function apiAddCoach() {
        await fetch('/api/coaches', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:document.getElementById('in_con').value, price:document.getElementById('in_cop').value}) });
        location.reload();
    }
    async function buyPlayer(id) {
        const cId = document.getElementById('selectClubP' + id).value;
        const r = await fetch(`/api/manage/buy-player?clubId=${cId}&playerId=${id}`, {method:'POST'});
        if (r.ok) location.reload(); else alert(await r.text());
    }
    async function hireCoach(id) {
        const cId = document.getElementById('selectClubC' + id).value;
        const r = await fetch(`/api/manage/hire-coach?clubId=${cId}&coachId=${id}`, {method:'POST'});
        if (r.ok) location.reload(); else alert(await r.text());
    }
    async function sellPlayer(cId, pId) {
        await fetch(`/api/manage/sell-player?clubId=${cId}&playerId=${pId}`, {method:'POST'});
        location.reload();
    }
    async function deleteClub(id) {
        if(confirm('Удалить клуб и расторгнуть все контракты?')) {
            await fetch('/api/clubs/'+id, {method:'DELETE'});
            location.reload();
        }
    }
</script>

</body>
</html>
