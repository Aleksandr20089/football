<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 2. ПРИНУДИТЕЛЬНО КРАСИМ ФОН ВСЕЙ СТРАНИЦЫ */
        body {
            background-color: #0f172a !important;
            color: #f8fafc !important;
            margin: 0;
            padding: 0;
        }
        .navbar { background-color: #1e293b !important; border-bottom: 2px solid #06b6d4; }
        .accent-text { color: #22d3ee !important; }

        /* Стили для таблицы, чтобы она не была серой */
        .table-dark {
            background-color: #1e293b !important;
            --bs-table-bg: #1e293b !important;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">FOOTBALL <span class="accent-text">AGGREGATOR</span></span>
    </div>
</nav>

<div class="container">
    <div class="row mt-5">
        <div class="col-12">
            <h2 class="accent-text mb-4">Текущий состав</h2>
            <table class="table table-dark table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Позиция</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="player : ${players}">
                    <td th:text="${player.id}">1</td>
                    <td th:text="${player.name}">Имя</td>
                    <td th:text="${player.position}">Позиция</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
